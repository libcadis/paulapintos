<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Example | Luxury Dark</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="ds-hero">
    <div class="ds-hero-inner">
      <p class="ds-micro text-secondary mb-6">PAULA PINTOS HAIR STUDIO</p>

      <h1 class="ds-h1-hero text-main mb-6">
        Tu cabello,
        <span class="ds-gradient-text italic">tu identidad</span>
      </h1>

      <p class="ds-body max-w-2xl mx-auto mb-10">
        Especialistas en color premium, diagnóstico personalizado y técnicas de alto impacto visual
        para lograr resultados elegantes, modernos y saludables.
      </p>

      <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
        <a href="agendar turno.html" class="ds-gradient-btn px-10 py-4">Reservar ahora</a>
        <a href="index.html#servicios" class="border-soft-strong rounded-full px-10 py-4 text-main text-xs uppercase tracking-[0.16em] font-semibold hover:bg-white/5 transition">Ver servicios</a>
      </div>

      <p class="font-accent text-4xl text-white/85 mt-10">Beauty begins with confidence</p>
    </div>
  </section>
</body>
</html>
