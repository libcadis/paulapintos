function showSection(section, el) {
  document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active-tab"));
  if (el) el.classList.add("active-tab");

  if(section === "turnos") loadTurnos();
  if(section === "servicios") loadServicios();
  if(section === "config") loadConfig();
  if(section === "productos") loadProductos();
}

function showAdminNotice(message, type = "success") {
  const notice = document.getElementById("admin-notice");
  if (!notice) return;

  const isError = type === "error";
  notice.className = `mb-4 px-4 py-2 rounded text-xs md:text-sm border ${isError ? 'bg-red-500/15 border-red-500/40 text-red-300' : 'bg-green-500/15 border-green-500/40 text-green-300'}`;
  notice.textContent = message;
  notice.classList.remove("hidden");
}

function getServiceDescription(service) {
  return service.descripcion || service.detalle || service.incluye || "";
}

async function upsertServicioWithDescription(id, baseData, descriptionText) {
  const descriptionCandidates = ["descripcion", "detalle", "incluye"];
  let lastError = null;

  for (const field of descriptionCandidates) {
    const payload = { ...baseData, [field]: descriptionText };
    const query = id
      ? supabaseClient.from("servicios").update(payload).eq("id", id)
      : supabaseClient.from("servicios").insert([payload]);

    const { error } = await query;
    if (!error) return { ok: true, descriptionSaved: true };

    const msg = String(error.message || "").toLowerCase();
    const mentionsField = msg.includes(field);
    const unknownColumn = msg.includes("column") || msg.includes("schema cache") || msg.includes("does not exist");
    if (!(mentionsField || unknownColumn)) {
      return { ok: false, error };
    }

    lastError = error;
  }

  const fallbackQuery = id
    ? supabaseClient.from("servicios").update(baseData).eq("id", id)
    : supabaseClient.from("servicios").insert([baseData]);

  const { error: fallbackError } = await fallbackQuery;
  if (fallbackError) return { ok: false, error: fallbackError || lastError };

  return { ok: true, descriptionSaved: false };
}

};

let turnosCache = [];
const turnosViewState = {
  query: '',
  status: 'todos',
  sort: 'fecha_desc'
};

function getTurnoSearchText(turno) {
  return `${turno?.nombre || ''} ${turno?.tel || ''} ${turno?.servicio || ''}`.toLowerCase();
}

function getFilteredTurnos() {
  const normalizedQuery = String(turnosViewState.query || '').trim().toLowerCase();
  const normalizedStatus = String(turnosViewState.status || 'todos').toLowerCase();

  const parseTurnoDateTime = (turno) => {
    const fecha = String(turno?.fecha || '');
    const horaRaw = String(turno?.hora || '00:00');
    const hora = horaRaw.length >= 5 ? horaRaw.slice(0, 5) : '00:00';
    const isoLike = `${fecha}T${hora}`;
    const ts = Date.parse(isoLike);
    return Number.isFinite(ts) ? ts : 0;
  };

  const filtered = (turnosCache || []).filter((turno) => {
    const matchesStatus = normalizedStatus === 'todos' || String(turno?.estado || '').toLowerCase() === normalizedStatus;
    if (!matchesStatus) return false;

    if (!normalizedQuery) return true;
    return getTurnoSearchText(turno).includes(normalizedQuery);
  });

  const sortMode = String(turnosViewState.sort || 'fecha_desc');
  const sorted = [...filtered].sort((a, b) => {
    const tA = parseTurnoDateTime(a);
    const tB = parseTurnoDateTime(b);
    if (sortMode === 'fecha_asc') return tA - tB;
    return tB - tA;
  });

  return sorted;
}

function bindTurnosControls() {
  const searchInput = document.getElementById('turnos-search');
  const statusSelect = document.getElementById('turnos-status');
  const sortSelect = document.getElementById('turnos-sort');

  if (searchInput) {
    searchInput.addEventListener('input', (e) => {
      turnosViewState.query = e.target.value || '';
      renderTurnos();
    });
  }

  if (statusSelect) {
    statusSelect.addEventListener('change', (e) => {
      turnosViewState.status = e.target.value || 'todos';
      renderTurnos();
    });
  }

  if (sortSelect) {
    sortSelect.addEventListener('change', (e) => {
      turnosViewState.sort = e.target.value || 'fecha_desc';
      renderTurnos();
    });
  }
}

async function loadTurnos() {
  try {
    let data = null;
    let error = null;

    // Intento principal: consulta con orden en DB.
    const primary = await supabaseClient.from('turnos').select('*').order('fecha', { ascending: false });
    data = primary.data;
    error = primary.error;

    // Fallback: si falla el ORDER BY (tipo/columna), traer sin orden y ordenar en cliente.
    if (error) {
      const fallback = await supabaseClient.from('turnos').select('*');
      data = fallback.data;
      error = fallback.error;
    }

    if (error) throw error;
    turnosCache = data || [];
    renderTurnos();
  } catch (e) {
    const msg = String(e?.message || e || 'Error desconocido');
    const lowerMsg = msg.toLowerCase();
    const isPermissionIssue = lowerMsg.includes('permission denied') || lowerMsg.includes('rls') || lowerMsg.includes('row-level');

    const help = isPermissionIssue
      ? 'Falta permiso SELECT en tabla turnos. Ejecutá en Supabase SQL Editor: GRANT SELECT ON turnos TO anon; y una policy SELECT para anon.'
      : 'Revisá conexión y políticas de Supabase para tabla turnos.';

    document.getElementById('content').innerHTML = `
      <div class="glass p-4 md:p-6 rounded-2xl">
        <h2 class="text-lg md:text-xl mb-4">Lista de Turnos</h2>
        <div class="rounded-xl border border-red-500/30 bg-red-500/10 p-4">
          <p class="text-sm text-red-300">No se pudieron cargar los turnos.</p>
          <p class="text-xs text-red-200/80 mt-1 break-words">${msg}</p>
          <p class="text-xs text-red-200/70 mt-2 break-words">${help}</p>
          <button onclick="loadTurnos()" class="mt-3 px-3 py-1.5 text-xs rounded-lg border border-red-400/40 text-red-200 hover:bg-red-500/20 transition">Reintentar</button>
        </div>
      </div>
    `;
  }
}

          <textarea id="edit-descripcion-${s.id}" class="p-2 bg-black/70 border border-white/10 rounded-lg text-xs w-full min-h-24 focus:outline-none focus:border-cyan-400/70" placeholder="Descripción">${getServiceDescription(s)}</textarea>

          <button onclick="eliminarServicio(${s.id})" class="text-red-300 text-xs md:text-sm flex-1 bg-red-500/20 border border-red-500/30 px-2.5 py-2 rounded-lg hover:bg-red-500/35 transition">Eliminar</button>

  html+=`</div>`;

async function agregarServicio() {
  const servicio = document.getElementById("nuevoNombre").value.trim();
  const precio = Number(document.getElementById("nuevoPrecio").value);
  const duracion = document.getElementById("nuevoDuracion").value.trim();
  const descripcion = document.getElementById("nuevaDescripcion").value.trim();

  if (!servicio) {
    showAdminNotice("Ingresá el nombre del servicio", "error");
    return;
  }

  if (!Number.isFinite(precio) || precio < 0) {
    showAdminNotice("Ingresá un precio válido", "error");
    return;
  }

  const result = await upsertServicioWithDescription(null, { servicio, precio, duracion }, descripcion);
  if (!result.ok) {
    showAdminNotice(`No se pudo agregar el servicio: ${result.error.message}`, "error");
    return;
  }

  document.getElementById("nuevoNombre").value = "";
  document.getElementById("nuevoPrecio").value = "";
  document.getElementById("nuevoDuracion").value = "";
  document.getElementById("nuevaDescripcion").value = "";
  const msg = result.descriptionSaved
    ? "Servicio agregado correctamente"
    : "Servicio agregado, pero no se guardo la descripcion (falta columna en Supabase).";
  const type = result.descriptionSaved ? "success" : "error";
  loadServicios(msg, type);
}

async function guardarServicio(id) {
  const servicio = document.getElementById(`edit-nombre-${id}`).value;
  const precio = Number(document.getElementById(`edit-precio-${id}`).value);
  const duracion = document.getElementById(`edit-duracion-${id}`).value;
  const descripcion = document.getElementById(`edit-descripcion-${id}`).value;

  if (!servicio.trim()) {
    showAdminNotice("El nombre no puede estar vacío", "error");
    return;
  }

  if (!Number.isFinite(precio) || precio < 0) {
    showAdminNotice("Ingresá un precio válido", "error");
    return;
  }

  const result = await upsertServicioWithDescription(
    id,
    { servicio: servicio.trim(), precio, duracion: duracion.trim() },
    descripcion.trim()
  );

  if (!result.ok) {
    showAdminNotice(`No se pudo guardar el servicio: ${result.error.message}`, "error");
    return;
  }

  const msg = result.descriptionSaved
    ? "Servicio actualizado"
    : "Servicio actualizado, pero no se guardo la descripcion (falta columna en Supabase).";
  const type = result.descriptionSaved ? "success" : "error";
  loadServicios(msg, type);
}

async function eliminarServicio(id){
  await supabaseClient.from("servicios").delete().eq("id",id);
  loadServicios();
}

// ⚙️ CONFIGURACIÓN
async function crearConfiguracionBase(){
  try {
    const payload = {
      hora_inicio: '09:00',
      hora_fin: '18:00',
      dias_disponibles: '[1,2,3,4,5]',
      alias_pago: 'paula.pintos',
      porcentaje_sena: 50,
      admin_username: 'admin',
      admin_email: null,
      admin_password: null,
      admin_password_hash: null
    };

    const { error } = await supabaseClient
      .from('configuracion')
      .insert([payload]);

    if (error) {
      const msg = String(error.message || '').toLowerCase();
      if (msg.includes('permission denied') || msg.includes('rls') || msg.includes('row-level')) {
        alert('Sin permiso para crear la configuración base. Ejecutá en Supabase SQL Editor: GRANT INSERT ON TABLE public.configuracion TO authenticated; y una policy INSERT para authenticated.');
      } else {
        alert('No se pudo crear la configuración base: ' + (error.message || 'error desconocido'));
      }
      return;
    }

    alert('Configuración base creada correctamente');
    loadConfig();
  } catch (e) {
    alert('No se pudo crear la configuración base: ' + (e?.message || e));
  }
}

async function loadConfig(){
  const contentEl = document.getElementById("content");

async function guardarConfig(id){
  try {
    const diasStr = document.getElementById("dias_disponibles").value;
    const adminEmailValue = document.getElementById("admin_email").value.trim();
    JSON.parse(diasStr); // Validar que sea JSON válido

    const payload = {
      hora_inicio:document.getElementById("hora_inicio").value,
      hora_fin:document.getElementById("hora_fin").value,
      alias_pago:document.getElementById("alias_pago").value,
      porcentaje_sena:parseInt(document.getElementById("porcentaje_sena").value),
      dias_disponibles:diasStr,
      admin_email:adminEmailValue || null
    };

    let { error } = await supabaseClient.from("configuracion").update(payload).eq("id",id);

    if (error) {
      const msg = String(error.message || '').toLowerCase();
      const missingEmailColumn = msg.includes('admin_email') || msg.includes('does not exist') || msg.includes('schema cache');
      if (!missingEmailColumn) {
        throw error;
      }

      const { error: fallbackError } = await supabaseClient.from("configuracion").update({
        hora_inicio:document.getElementById("hora_inicio").value,
        hora_fin:document.getElementById("hora_fin").value,
        alias_pago:document.getElementById("alias_pago").value,
        porcentaje_sena:parseInt(document.getElementById("porcentaje_sena").value),
        dias_disponibles:diasStr
      }).eq("id",id);

      if (fallbackError) {
        throw fallbackError;
      }

      alert("Configuración actualizada (sin guardar admin_email: falta columna en Supabase)");
      loadConfig();
      return;
    }

    alert("Configuración actualizada correctamente");
    loadConfig();
  } catch(e) {
    const msg = String(e?.message || e || '').toLowerCase();
    if (msg.includes('permission denied') || msg.includes('rls') || msg.includes('row-level')) {
      alert('Sin permiso para guardar. Ejecutá este SQL en Supabase → SQL Editor:\n\nALTER TABLE configuracion ENABLE ROW LEVEL SECURITY;\n\nCREATE POLICY "admin_update" ON configuracion\nFOR UPDATE TO anon USING (true) WITH CHECK (true);\n\nCREATE POLICY "admin_select" ON configuracion\nFOR SELECT TO anon USING (true);');
    } else if (msg.includes('json') || msg.includes('parse')) {
      alert('Error: Verificá que el formato JSON de días sea válido. Ejemplo: [1,2,3,4,5]');
    } else {
      alert('Error al guardar configuración: ' + (e?.message || e));
    }
  }
}

async function actualizarPasswordAdmin(id) {
  const newPasswordInput = document.getElementById('admin_password_new');
  const confirmPasswordInput = document.getElementById('admin_password_confirm');

  const newPassword = (newPasswordInput?.value || '').trim();
  const confirmPassword = (confirmPasswordInput?.value || '').trim();

  if (!newPassword || !confirmPassword) {
    alert('Completá ambos campos de contraseña');
    return;
  }

  if (newPassword.length < 10) {
    alert('La contraseña debe tener al menos 10 caracteres');
    return;
  }

  if (newPassword !== confirmPassword) {
    alert('Las contraseñas no coinciden');
    return;
  }

  try {
    const hash = await sha256(newPassword);

    let { error } = await supabaseClient
      .from('configuracion')
      .update({ admin_password_hash: hash, admin_password: null })
      .eq('id', id);

    if (error) {
      const msg = String(error.message || '').toLowerCase();
      const missingHashColumn = msg.includes('admin_password_hash') || msg.includes('does not exist') || msg.includes('schema cache');

      if (missingHashColumn) {
        // Fallback temporal para compatibilidad si todavía no se creó la columna hash.
        const { error: fallbackError } = await supabaseClient
          .from('configuracion')
          .update({ admin_password: newPassword })
          .eq('id', id);

        if (fallbackError) {
          alert(`No se pudo actualizar la contraseña: ${fallbackError.message}`);
          return;
        }

        alert('Contraseña actualizada en modo compatibilidad. Recomendado: crear admin_password_hash para máxima seguridad.');
      } else {
        const msgErr = String(error.message || '').toLowerCase();
        if (msgErr.includes('permission denied') || msgErr.includes('rls') || msgErr.includes('row-level')) {
          alert('Sin permiso para guardar. Ejecutá este SQL en Supabase → SQL Editor:\n\nALTER TABLE configuracion ENABLE ROW LEVEL SECURITY;\n\nCREATE POLICY "admin_update" ON configuracion\nFOR UPDATE TO anon USING (true) WITH CHECK (true);\n\nCREATE POLICY "admin_select" ON configuracion\nFOR SELECT TO anon USING (true);');
        } else {
          alert(`No se pudo actualizar la contraseña: ${error.message}`);
        }
        return;
      }
    } else {
      alert('Contraseña de admin actualizada de forma segura');
    }

    if (newPasswordInput) newPasswordInput.value = '';
    if (confirmPasswordInput) confirmPasswordInput.value = '';
  } catch (e) {
    alert('Error al actualizar la contraseña admin');
    console.error(e);
  }
}

// Subir imagen a Supabase Storage
async function subirImagenAStorage(archivo) {
  if (!archivo) return null;

  // Validar que sea imagen
  if (!archivo.type.startsWith('image/')) {
    alert('Por favor selecciona un archivo de imagen (JPG, PNG, WebP)');
    return null;
  }

  // Validar tamaño (máx 5MB)
  if (archivo.size > 5 * 1024 * 1024) {
    alert('La imagen no debe superar 5MB');
    return null;
  }

  try {
    // Generar nombre único para el archivo
    const timestamp = Date.now();
    const extension = archivo.name.substring(archivo.name.lastIndexOf('.'));
    const nombreUnico = `producto_${timestamp}${extension}`;

    console.log('Iniciando subida de:', nombreUnico);

    // Subir a Storage
    const { data, error } = await supabaseClient.storage
      .from('productos')
      .upload(nombreUnico, archivo);

    if (error) {
      console.error('Error subiendo imagen:', error);
      alert('Error al subir la imagen: ' + (error.message || JSON.stringify(error)));
      return null;
    }

    console.log('Imagen subida exitosamente:', data);
    alert('✅ Imagen subida correctamente');
    return nombreUnico;
  } catch (error) {
    console.error('Error en subida:', error);
    alert('Error: ' + error.message);
    return null;
  }
}

function previsualizarImagen(productoId) {

      console.log('Imagen seleccionada:', archivo.name);
    };
    reader.readAsDataURL(archivo);
  }
}

async function agregarProducto(){
  const nombre = document.getElementById("prodNombre").value;
  const precio = parseInt(document.getElementById("prodPrecio").value);
  const stock = parseInt(document.getElementById("prodStock").value);
  const descuento = parseInt(document.getElementById("prodDescuento").value) || 0;
  const archivoImagen = document.getElementById("prodImagenFile").files[0];

  if (!nombre || !precio || stock === null) {
    alert("Completa los campos: Nombre, Precio y Stock");
    return;
  }

  let nombreImagen = null;

  // Si se seleccionó una imagen, subirla
  if (archivoImagen) {
    nombreImagen = await subirImagenAStorage(archivoImagen);
    if (!nombreImagen) return;
  }

  await supabaseClient.from("productos").insert([{
    nombre,
    precio,
    stock,
    descuento,
    imagen: nombreImagen,
    activo: true
  }]);

  document.getElementById("prodNombre").value = "";
  document.getElementById("prodPrecio").value = "";
  document.getElementById("prodStock").value = "";
  document.getElementById("prodDescuento").value = "";
  document.getElementById("prodImagenFile").value = "";
  
  alert("Producto agregado correctamente");
  loadProductos();
}

async function guardarProducto(id){
  const nombre = document.getElementById(`prod-nombre-${id}`).value;
  const precio = parseInt(document.getElementById(`prod-precio-${id}`).value);
  const stock = parseInt(document.getElementById(`prod-stock-${id}`).value);
  const descuento = parseInt(document.getElementById(`prod-descuento-${id}`).value) || 0;
  const archivoImagen = document.getElementById(`prod-imagen-file-${id}`).files[0];
  const activo = document.getElementById(`prod-activo-${id}`).checked;

  if (!nombre || !precio || stock === null) {
    alert("Completa los campos: Nombre, Precio y Stock");
    return;
  }

  let nombreImagen = null;

  // Si se seleccionó una imagen, subirla
  if (archivoImagen) {
    nombreImagen = await subirImagenAStorage(archivoImagen);
    if (!nombreImagen) return;
  }

  // Preparar objeto de actualización
  const datosActualizar = {
    nombre,
    precio,
    stock,
    descuento,
    activo
  };

  // Solo actualizar imagen si se cargó una nueva
  if (nombreImagen) {
    datosActualizar.imagen = nombreImagen;
  }

  await supabaseClient.from("productos").update(datosActualizar).eq("id", id);

  alert("Producto actualizado");
  loadProductos();
}

async function eliminarProducto(id){
  if (confirm("¿Estás seguro de que quieres eliminar este producto?")) {
    await supabaseClient.from("productos").delete().eq("id", id);
    loadProductos();
  }
}

    <p class="text-xs text-gray-400 mb-4">Ingresá la nueva contraseña para completar la recuperación.</p>

    <input id="recovery-password" type="password" placeholder="Nueva contraseña"
      class="p-3 rounded-xl bg-black/20 text-white mb-3 w-full text-sm" />
    <input id="recovery-password-confirm" type="password" placeholder="Confirmar nueva contraseña"
      class="p-3 rounded-xl bg-black/20 text-white mb-4 w-full text-sm" />

    <div class="flex gap-2">
      <button id="recovery-save-btn" class="flex-1 px-4 py-2 bg-cyan-500 text-black rounded-xl font-bold hover:bg-cyan-400 transition">Guardar</button>
      <button id="recovery-cancel-btn" class="flex-1 px-4 py-2 bg-white/10 text-white rounded-xl font-bold hover:bg-white/20 transition">Cancelar</button>
    </div>
  </div>
</div>

<script>
    const usernameInput = document.getElementById('username-input');
    const passwordInput = document.getElementById('password-input');
    const loginBtn = document.getElementById('login-btn');
    const forgotBtn = document.getElementById('forgot-btn');
    const panel = document.getElementById('login-panel');
    const recoveryPanel = document.getElementById('recovery-panel');
    const recoveryPasswordInput = document.getElementById('recovery-password');
    const recoveryPasswordConfirmInput = document.getElementById('recovery-password-confirm');
    const recoverySaveBtn = document.getElementById('recovery-save-btn');
    const recoveryCancelBtn = document.getElementById('recovery-cancel-btn');
    const twoFAPanel = document.getElementById('2fa-panel');
    const twoFACodeInput = document.getElementById('2fa-code');
    const twoFAVerifyBtn = document.getElementById('2fa-verify-btn');
    const twoFAResendBtn = document.getElementById('2fa-resend-btn');
    const twoFACancelBtn = document.getElementById('2fa-cancel-btn');
    const timerSeconds = document.getElementById('timer-seconds');
    const loginStatus = document.getElementById('login-status');

    let loginAttempts = 0;
    const MAX_ATTEMPTS = 5;
    const LOCKOUT_TIME = 5 * 60 * 1000;
    let lockoutUntil = null;
    let adminUsername = null;
    let adminPasswordHash = null;
    let adminPasswordPlain = null;
    let adminEmail = null;
    let adminConfigId = null;
    let pendingTwoFAEmail = null;
    let twoFAExpiry = null;
    let twoFATimerInterval = null;
    const OTP_EXPIRY_MS = 5 * 60 * 1000;
    const OTP_RESEND_COOLDOWN_MS = 60 * 1000;
    const TWO_FA_PENDING_KEY = 'admin_2fa_pending_until';

    function getOtpCacheKey(email) {
      return `admin_otp_last_sent_${String(email || '').toLowerCase()}`;
    }

    function getLastOtpSentAt(email) {
      try {
        const raw = localStorage.getItem(getOtpCacheKey(email));
        const value = Number(raw);
        return Number.isFinite(value) ? value : null;
      } catch (_) {
        return null;
      }
    }

    function setLastOtpSentAt(email, timestamp) {
      try {
        localStorage.setItem(getOtpCacheKey(email), String(timestamp));
      } catch (_) {
        // Ignorar errores de storage para no bloquear login.
      }
    }

    function setTwoFAPending() {
      try {
        sessionStorage.setItem(TWO_FA_PENDING_KEY, String(Date.now() + OTP_EXPIRY_MS));
      } catch (_) {
        // No bloquear si storage falla.
      }
    }

    function clearTwoFAPending() {
      try {
        sessionStorage.removeItem(TWO_FA_PENDING_KEY);
      } catch (_) {
        // No bloquear si storage falla.
      }
    }

    function isTwoFAPending() {
      try {
        const raw = sessionStorage.getItem(TWO_FA_PENDING_KEY);
        const value = Number(raw);
        return Number.isFinite(value) && Date.now() < value;
      } catch (_) {
        return false;
      }
    }

    function getResendRemainingSeconds(email) {
      if (!email) return 0;
      const lastSentAt = getLastOtpSentAt(email);
      if (!lastSentAt) return 0;
      return Math.max(0, Math.ceil(((lastSentAt + OTP_RESEND_COOLDOWN_MS) - Date.now()) / 1000));
    }

    function openTwoFAPanel() {
      panel.style.display = 'none';
      twoFAPanel.classList.remove('hidden');
      twoFAPanel.classList.add('flex');
      twoFACodeInput.focus();
      startTimer();
    }

    async function sha256(text) {
      const data = new TextEncoder().encode(text);
      const digest = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(digest))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');
    }

    async function showTwoFAPanel(email) {
      pendingTwoFAEmail = email;
      const now = Date.now();
      const lastSentAt = getLastOtpSentAt(email);

      // Si ya enviamos recientemente y sigue válido, no reenviar.
      if (lastSentAt) {
        const stillValid = now < (lastSentAt + OTP_EXPIRY_MS);
        const inCooldown = now < (lastSentAt + OTP_RESEND_COOLDOWN_MS);

        if (stillValid && inCooldown) {
          twoFAExpiry = lastSentAt + OTP_EXPIRY_MS;
          openTwoFAPanel();
          return;
        }
      }

      twoFAExpiry = now + OTP_EXPIRY_MS;

      const { error } = await supabaseClient.auth.signInWithOtp({
        email,
        options: {
          shouldCreateUser: true,
          emailRedirectTo: `${window.location.origin}${window.location.pathname}`
        }
      });

      if (error) {
        const msg = String(error.message || '').toLowerCase();
        const isRateLimit = msg.includes('rate limit') || msg.includes('too many requests') || msg.includes('email');

        // Si hay código previo válido, abrimos panel para ingresarlo.
        if (lastSentAt && now < (lastSentAt + OTP_EXPIRY_MS)) {
          twoFAExpiry = lastSentAt + OTP_EXPIRY_MS;
          openTwoFAPanel();
          return;
        }

        // Sin código previo y no podemos enviar: ingresamos sin 2FA y avisamos.
        if (isRateLimit) {
          panel.style.display = 'none';
          loginStatus.textContent = 'Acceso concedido (2FA omitido: límite de emails alcanzado).';
          clearTwoFAPending();
          return;
        }

        // Otro error de envío: ingresamos igual sin bloquear.
        panel.style.display = 'none';
        loginStatus.textContent = 'Acceso concedido (2FA omitido: error de email).';
        clearTwoFAPending();
        return;
      }

      setLastOtpSentAt(email, now);
      openTwoFAPanel();
    }

    function startTimer() {
      if (twoFATimerInterval) {
        clearInterval(twoFATimerInterval);
      }

      const updateTimerUi = () => {
        const remaining = Math.max(0, Math.ceil((twoFAExpiry - Date.now()) / 1000));
        timerSeconds.textContent = remaining;

        if (twoFAResendBtn) {
          const resendRemaining = getResendRemainingSeconds(pendingTwoFAEmail);
          const canResend = resendRemaining <= 0;
          twoFAResendBtn.disabled = !canResend;
          twoFAResendBtn.textContent = canResend
            ? 'Reenviar'
            : `Reenviar (${resendRemaining}s)`;
          twoFAResendBtn.classList.toggle('opacity-50', !canResend);
          twoFAResendBtn.classList.toggle('cursor-not-allowed', !canResend);
        }

        if (remaining === 0) {
          clearInterval(twoFATimerInterval);
          twoFATimerInterval = null;
          alert('El código expiró. Intenta nuevamente.');
          hideTwoFAPanel();
        }
      };

      updateTimerUi();
      twoFATimerInterval = setInterval(() => {
        updateTimerUi();
      }, 1000);
    }

    function hideTwoFAPanel() {
      if (twoFATimerInterval) {
        clearInterval(twoFATimerInterval);
        twoFATimerInterval = null;
      }
      twoFAPanel.classList.add('hidden');
      twoFAPanel.classList.remove('flex');
      twoFACodeInput.value = '';
      pendingTwoFAEmail = null;
      clearTwoFAPending();
      panel.style.display = 'flex';
      usernameInput.focus();
    }

    function isLockedOut() {
      if (lockoutUntil && Date.now() < lockoutUntil) {
        const remaining = Math.ceil((lockoutUntil - Date.now()) / 1000);
        loginStatus.textContent = 'Bloqueado por ' + remaining + 's. Demasiados intentos.';
        return true;
      }
      lockoutUntil = null;
      return false;
    }

    function recordFailedAttempt() {
      loginAttempts++;
      if (loginAttempts >= MAX_ATTEMPTS) {
        lockoutUntil = Date.now() + LOCKOUT_TIME;
        loginStatus.textContent = 'Bloqueado por 5 minutos tras ' + MAX_ATTEMPTS + ' intentos fallidos.';
        loginBtn.disabled = true;
        setTimeout(() => {
          loginAttempts = 0;
          lockoutUntil = null;
          loginBtn.disabled = false;
          loginStatus.textContent = 'Login disponible nuevamente.';
        }, LOCKOUT_TIME);
      } else {
        loginStatus.textContent = 'Intento ' + loginAttempts + '/' + MAX_ATTEMPTS;
      }
    }

    async function ensureAdminConfigRow(inputHash) {
      try {
        if (adminConfigId) {
          const updatePayload = {
            admin_username: adminUsername || 'admin',
            admin_password_hash: inputHash,
            admin_password: null,
            admin_email: adminEmail || null
          };
          const { error } = await supabaseClient
            .from('configuracion')
            .update(updatePayload)
            .eq('id', adminConfigId);
          if (!error) return true;
        }

        const insertPayload = {
          hora_inicio: '09:00',
          hora_fin: '19:00',
          dias_disponibles: '[1,2,3,4,5]',
          alias_pago: 'paula.pintos',
          porcentaje_sena: 50,
          admin_username: adminUsername || 'admin',
          admin_password_hash: inputHash,
          admin_password: null,
          admin_email: adminEmail || null
        };

        const { data, error } = await supabaseClient
          .from('configuracion')
          .insert([insertPayload])
          .select('id')
          .single();

        if (error) return false;
        adminConfigId = data?.id || null;
        return true;
      } catch (_) {
        return false;
      }
    }

    async function loadAdminCredentials() {
      try {
        const { data, error } = await supabaseClient
          .from('configuracion')
          .select('id, admin_username, admin_password_hash, admin_password, admin_email')
          .order('id', { ascending: true })
          .limit(1)
          .maybeSingle();

        if (error) throw error;

        if (!data) {
          adminUsername = 'admin';
          adminPasswordHash = null;
          adminPasswordPlain = null;
          adminEmail = null;
          adminConfigId = null;
          loginStatus.textContent = 'No existe fila de configuración. Podés ingresar con Auth y se creará automáticamente.';
          loginBtn.disabled = false;
          return;
        }

        adminUsername = data?.admin_username ? String(data.admin_username).trim() : 'admin';
        adminPasswordHash = data?.admin_password_hash ? String(data.admin_password_hash).trim().toLowerCase() : null;
        adminPasswordPlain = data?.admin_password ? String(data.admin_password).trim() : null;
        adminEmail = data?.admin_email ? String(data.admin_email).trim() : null;
        adminConfigId = data?.id || null;

        if (!adminPasswordHash && !adminPasswordPlain) {
          loginStatus.textContent = 'No hay contraseña admin configurada en Supabase.';
          loginBtn.disabled = false;
          return;
        }

        const status = adminEmail 
          ? 'Ingresa usuario y contraseña.'
          : 'Ingresa usuario y contraseña.';
        loginStatus.textContent = status;
        loginBtn.disabled = false;
      } catch (e) {
        loginStatus.textContent = 'No se pudo cargar configuración. Podés intentar iniciar sesión igual.';
        loginBtn.disabled = false;
        console.error('Error:', e);
      }
    }

    async function tryAuthPasswordFallback(inputPassword, inputUsername = '') {
      const emailCandidates = [];
      const normalizedAdminEmail = (adminEmail || '').trim().toLowerCase();
      const normalizedInputUsername = (inputUsername || '').trim().toLowerCase();

      if (normalizedAdminEmail) {
        emailCandidates.push(normalizedAdminEmail);
      }

      // Permite iniciar con email en el campo Usuario aunque admin_email no esté configurado.
      if (normalizedInputUsername.includes('@') && !emailCandidates.includes(normalizedInputUsername)) {
        emailCandidates.push(normalizedInputUsername);
      }

      if (!emailCandidates.length) {
        return { ok: false, reason: 'missing-email' };
      }

      let authOk = false;
      let lastError = null;
      for (const email of emailCandidates) {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email,
          password: inputPassword
        });

        if (!error && data?.session) {
          authOk = true;
          if (!adminEmail) {
            adminEmail = email;
          }
          break;
        }

        lastError = error;
      }

      if (!authOk) {
        return { ok: false, reason: 'auth-failed', error: lastError };
      }

      // Sincroniza hash en configuracion para evitar depender de este fallback.
      try {
        const inputHash = await sha256(inputPassword);
        await ensureAdminConfigRow(inputHash);
        adminPasswordHash = inputHash;
        adminPasswordPlain = null;
      } catch (_) {
        // No bloqueamos el login por un fallo de sincronización.
      }

      return { ok: true };
    }

    async function ensureAuthenticatedSession(inputPassword, inputUsername = '') {
      try {
        const { data } = await supabaseClient.auth.getSession();
        if (data?.session) {
          return { ok: true };
        }
      } catch (_) {
        // Si falla lectura de sesión, intentamos login por password.
      }

      return await tryAuthPasswordFallback(inputPassword, inputUsername);
    }

    async function checkPassword() {
      if (isLockedOut()) return;
      if (loginBtn.disabled) return;

      if (!adminUsername) {
        adminUsername = 'admin';
      }

      if (!adminPasswordHash && !adminPasswordPlain) {
        const inputUsernameWithoutConfig = (usernameInput?.value || '').trim();
        const inputPasswordWithoutConfig = (passwordInput?.value || '').trim();

        if (!inputUsernameWithoutConfig || !inputPasswordWithoutConfig) {
          alert('Ingresá usuario y contraseña');
          return;
        }

        const usernameLooksLikeEmail = inputUsernameWithoutConfig.includes('@');
        if (inputUsernameWithoutConfig !== adminUsername && !usernameLooksLikeEmail) {
          recordFailedAttempt();
          alert('Usuario o contraseña incorrectos');
          return;
        }

        const authSession = await ensureAuthenticatedSession(inputPasswordWithoutConfig, inputUsernameWithoutConfig);
        if (!authSession.ok) {
          const authReason = authSession.reason === 'missing-email'
            ? 'Falta configurar admin_email o ingresar un email en el campo Usuario.'
            : 'La clave de Auth no coincide.';
          alert('No se pudo validar el acceso: se requiere sesión Auth activa para el panel admin. ' + authReason);
          return;
        }

        loginAttempts = 0;
        setTwoFAPending();
        if (adminEmail) {
          await showTwoFAPanel(adminEmail);
        } else {
          panel.style.display = 'none';
        }
        return;
      }

      const inputUsername = (usernameInput?.value || '').trim();
      const inputPassword = (passwordInput?.value || '').trim();

      if (!inputUsername || !inputPassword) {
        alert('Ingresá usuario y contraseña');
        return;
      }

      if (inputUsername !== adminUsername) {
        recordFailedAttempt();
        alert('Usuario o contraseña incorrectos');
        return;
      }

      const inputHash = await sha256(inputPassword);
      const matchesHash = adminPasswordHash && inputHash === adminPasswordHash;
      const matchesPlain = adminPasswordPlain && inputPassword === adminPasswordPlain;

      if (!matchesHash && !matchesPlain) {
        // Si Auth ya tiene la contraseña nueva (por recovery) pero configuracion quedó vieja,
        // aceptamos por Auth y resincronizamos hash en configuracion.
        const authFallback = await tryAuthPasswordFallback(inputPassword, inputUsername);
        if (!authFallback.ok) {
          recordFailedAttempt();
          alert('Usuario o contraseña incorrectos');
          return;
        }
      }

      const authSession = await ensureAuthenticatedSession(inputPassword, inputUsername);
      if (!authSession.ok) {
        const authReason = authSession.reason === 'missing-email'
          ? 'Falta configurar admin_email o ingresar un email en Usuario.'
          : 'La clave de Auth no coincide.';
        alert('No se pudo abrir el panel admin porque falta sesión autenticada. ' + authReason);
        return;
      }

      loginAttempts = 0;

      if (adminEmail) {
        setTwoFAPending();
        await showTwoFAPanel(adminEmail);
      } else {
        panel.style.display = 'none';
      }
    }

    async function verify2FA() {
      const inputCode = (twoFACodeInput?.value || '').trim();

      if (!inputCode) {
        alert('Ingresá el código de 6 dígitos');
        return;
      }

      if (Date.now() > twoFAExpiry) {
        alert('El código expiró.');
        hideTwoFAPanel();
        return;
      }

      if (!pendingTwoFAEmail) {
        alert('No hay verificación activa. Intentá iniciar sesión nuevamente.');
        return;
      }

      const { error } = await supabaseClient.auth.verifyOtp({
        email: pendingTwoFAEmail,
        token: inputCode,
        type: 'email'
      });

      if (error) {
        alert('Código incorrecto o expirado.');
        return;
      }

      panel.style.display = 'none';
      twoFAPanel.classList.add('hidden');
      twoFAPanel.classList.remove('flex');
      twoFACodeInput.value = '';
      pendingTwoFAEmail = null;
      clearTwoFAPending();
    }

    loginBtn.addEventListener('click', () => {
      checkPassword().catch(e => console.error(e));
    });

    usernameInput.addEventListener('keypress', e => {
      if (e.key === 'Enter') passwordInput.focus();
    });

    passwordInput.addEventListener('keypress', e => {
      if (e.key === 'Enter') checkPassword().catch(err => console.error(err));
    });

    twoFACodeInput.addEventListener('keypress', e => {
      if (e.key === 'Enter') verify2FA().catch(err => console.error(err));
    });

    twoFAVerifyBtn.addEventListener('click', () => {
      verify2FA().catch(e => console.error(e));
    });

    twoFAResendBtn.addEventListener('click', () => {
      if (!pendingTwoFAEmail) {
        alert('No hay verificación activa. Volvé a iniciar sesión.');
        return;
      }

      const resendRemaining = getResendRemainingSeconds(pendingTwoFAEmail);
      if (resendRemaining > 0) {
        alert('Esperá ' + resendRemaining + 's para reenviar el código.');
        return;
      }

      showTwoFAPanel(pendingTwoFAEmail).catch(e => {
        console.error(e);
        alert('No se pudo reenviar el código en este momento');
      });
    });

    twoFACancelBtn.addEventListener('click', () => {
      loginAttempts = 0;
      hideTwoFAPanel();
    });

    function hasRecoveryHash() {
    const hash = window.location.hash || '';
    return hash.includes('type=recovery') || hash.includes('access_token=');
  }

  function showRecoveryPanel() {
    if (!recoveryPanel) return;
    panel.style.display = 'none';
    recoveryPanel.classList.remove('hidden');
    recoveryPanel.classList.add('flex');
  }

  function hideRecoveryPanel() {
    if (!recoveryPanel) return;
    recoveryPanel.classList.add('hidden');
    recoveryPanel.classList.remove('flex');
    panel.style.display = 'flex';
  }

  async function saveRecoveredPasswordInConfig(newPassword) {
    const hash = await sha256(newPassword);
    let targetId = adminConfigId;

    if (!targetId) {
      const { data: cfgRow, error: cfgErr } = await supabaseClient
        .from('configuracion')
        .select('id')
        .order('id', { ascending: true })
        .limit(1)
        .maybeSingle();

      if (cfgErr) {
        throw cfgErr;
      }

      if (!cfgRow?.id) {
        throw new Error('No existe una fila en configuracion para guardar la contraseña admin.');
      }

      targetId = cfgRow.id;
      adminConfigId = cfgRow.id;
    }

    let { error } = await supabaseClient
      .from('configuracion')
      .update({ admin_password_hash: hash, admin_password: null })
      .eq('id', targetId);

    if (error) {
      const msg = String(error.message || '').toLowerCase();
      const missingHashColumn = msg.includes('admin_password_hash') || msg.includes('does not exist') || msg.includes('schema cache');
      if (missingHashColumn) {
        const { error: fallbackError } = await supabaseClient
          .from('configuracion')
          .update({ admin_password: newPassword })
          .eq('id', targetId);
        if (fallbackError) {
          throw fallbackError;
        }
      } else {
        throw error;
      }
    }
  }

  async function sendRecoveryEmail() {
    const redirectTo = `${window.location.origin}${window.location.pathname}`;

    // Leer admin_email de configuracion
    let emailDestino = adminEmail;

    if (!emailDestino) {
      const { data: cfgData } = await supabaseClient
        .from('configuracion')
        .select('admin_email')
        .order('id', { ascending: true })
        .limit(1)
        .maybeSingle();
      emailDestino = cfgData?.admin_email ? String(cfgData.admin_email).trim() : null;
    }

    if (!emailDestino) {
      const ingresado = prompt('No hay email de recuperación configurado. Ingresá tu email admin:');
      emailDestino = ingresado ? ingresado.trim() : null;
    }

    if (!emailDestino) {
      alert('No se pudo enviar: falta el email de recuperación.');
      return;
    }

    const { error } = await supabaseClient.auth.resetPasswordForEmail(emailDestino, {
      redirectTo
    });

    if (error) {
      alert(`No se pudo enviar el mail de recuperación: ${error.message}`);
      return;
    }

    alert('✉️ Te enviamos un mail de recuperación a ' + emailDestino + '. Revisá también spam.');
  }

  async function completeRecovery() {
    const newPassword = (recoveryPasswordInput?.value || '').trim();
    const confirmPassword = (recoveryPasswordConfirmInput?.value || '').trim();

    if (!newPassword || !confirmPassword) {
      alert('Completá ambos campos de contraseña');
      return;
    }

    if (newPassword.length < 10) {
      alert('La contraseña debe tener al menos 10 caracteres');
      return;
    }

    if (newPassword !== confirmPassword) {
      alert('Las contraseñas no coinciden');
      return;
    }

    const { error } = await supabaseClient.auth.updateUser({ password: newPassword });
    if (error) {
      alert(`No se pudo actualizar la contraseña en Auth: ${error.message}`);
      return;
    }

    try {
      await saveRecoveredPasswordInConfig(newPassword);
    } catch (e) {
      alert(`La contraseña se cambió en Auth, pero falló al sincronizar configuracion: ${e.message || e}`);
      return;
    }

    await supabaseClient.auth.signOut();

    if (recoveryPasswordInput) recoveryPasswordInput.value = '';
    if (recoveryPasswordConfirmInput) recoveryPasswordConfirmInput.value = '';

    if (window.location.hash) {
      history.replaceState({}, document.title, window.location.pathname);
    }

    hideRecoveryPanel();
    alert('Contraseña actualizada. Ya podés ingresar con la nueva contraseña.');
    loadAdminCredentials();
  }

  forgotBtn.addEventListener('click', () => {
    sendRecoveryEmail().catch((e) => {
      console.error('Error enviando recuperación:', e);
      alert('Ocurrió un error al enviar el mail de recuperación');
    });
  });
  recoverySaveBtn.addEventListener('click', () => {
    completeRecovery().catch((e) => {
      console.error('Error completando recuperación:', e);
      alert('Ocurrió un error al restablecer la contraseña');
    });
  });
  recoveryCancelBtn.addEventListener('click', () => {
    hideRecoveryPanel();
  });

  supabaseClient.auth.onAuthStateChange((event) => {
    if (event === 'PASSWORD_RECOVERY') {
      showRecoveryPanel();
      return;
    }

    if (event === 'SIGNED_IN' && isTwoFAPending()) {
      panel.style.display = 'none';
      twoFAPanel.classList.add('hidden');
      twoFAPanel.classList.remove('flex');
      clearTwoFAPending();
      if (window.location.hash) {
        history.replaceState({}, document.title, window.location.pathname);
      }
    }
  });

  if (hasRecoveryHash()) {
    showRecoveryPanel();
  }

  supabaseClient.auth.getSession().then(({ data }) => {
    if (data?.session && isTwoFAPending()) {
      panel.style.display = 'none';
      clearTwoFAPending();
      if (window.location.hash) {
        history.replaceState({}, document.title, window.location.pathname);
      }
    }
  }).catch(() => {
    // Ignorar fallos al leer sesión.
  });

  loadAdminCredentials();
</script>

<!-- Header Admin -->
<header class="flex flex-col md:flex-row items-start md:items-center justify-between mb-6 md:mb-10 gap-4">
  <!-- Logo -->
  <div class="flex items-center gap-2 md:gap-3">
    <img src="img/logo web.png" alt="Paula Pintos" class="h-8 md:h-10">
    <span class="font-bold tracking-wide text-sm md:text-base">Admin Panel</span>
  </div>

  <div class="flex flex-col md:flex-row gap-2 w-full md:w-auto">
    <!-- Botón Home -->
    <a href="index.html"
       class="glass px-4 md:px-6 py-2 md:py-3 rounded-xl hover:bg-white/10 transition flex items-center gap-2 text-xs md:text-sm w-full md:w-auto justify-center md:justify-start">
      <i class="fas fa-home"></i>
      <span>Inicio</span>
    </a>
    <button id="logout-btn" type="button"
       class="px-4 md:px-6 py-2 md:py-3 rounded-xl border border-red-500/40 bg-red-500/10 text-red-300 hover:bg-red-500/20 transition flex items-center gap-2 text-xs md:text-sm w-full md:w-auto justify-center md:justify-start">
      <i class="fas fa-right-from-bracket"></i>
      <span>Cerrar Sesión</span>
    </button>
  </div>
</header>

<!-- Botones de Pestaña -->
<div class="flex flex-wrap gap-2 md:gap-4 mb-6 md:mb-10">
  <button onclick="showSection('turnos', this)" class="tab-btn px-3 md:px-6 py-2 md:py-3 rounded-xl glass text-xs md:text-sm flex-1 md:flex-none font-medium">Turnos</button>
  <button onclick="showSection('servicios', this)" class="tab-btn px-3 md:px-6 py-2 md:py-3 rounded-xl glass text-xs md:text-sm flex-1 md:flex-none font-medium">Servicios</button>
  <button onclick="showSection('config', this)" class="tab-btn px-3 md:px-6 py-2 md:py-3 rounded-xl glass text-xs md:text-sm flex-1 md:flex-none font-medium">Config</button>
  <button onclick="showSection('productos', this)" class="tab-btn px-3 md:px-6 py-2 md:py-3 rounded-xl glass text-xs md:text-sm flex-1 md:flex-none font-medium">Productos</button>
</div>

<!-- Contenido Principal -->
<div id="content" class="max-w-full overflow-x-auto"></div>

<script>
const logoutBtn = document.getElementById('logout-btn');
logoutBtn?.addEventListener('click', async () => {
  try {
    await supabaseClient.auth.signOut();
  } catch (e) {
    console.error('Error cerrando sesión:', e);
  }

  const loginPanelEl = document.getElementById('login-panel');
  const twoFAPanelEl = document.getElementById('2fa-panel');
  const recoveryPanelEl = document.getElementById('recovery-panel');
  const usernameEl = document.getElementById('username-input');
  const passwordEl = document.getElementById('password-input');
  const loginStatusEl = document.getElementById('login-status');

  if (twoFAPanelEl) {
    twoFAPanelEl.classList.add('hidden');
    twoFAPanelEl.classList.remove('flex');
  }
  if (recoveryPanelEl) {
    recoveryPanelEl.classList.add('hidden');
    recoveryPanelEl.classList.remove('flex');
  }
  if (loginPanelEl) {
    loginPanelEl.style.display = 'flex';
  }
  if (usernameEl) usernameEl.value = '';
  if (passwordEl) passwordEl.value = '';
  if (loginStatusEl) loginStatusEl.textContent = 'Sesión cerrada. Ingresá nuevamente.';
});

setTimeout(() => showSection('turnos'), 500);
</script>

</body>
</html>
